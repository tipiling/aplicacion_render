<!DOCTYPE html>
<html>
<head>
    <title>Registro de Usuarios</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #2a5298;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .msg {
            text-align: center;
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Registro de Usuarios</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido" placeholder="Apellido" required>
        <input type="text" name="usuario" placeholder="Usuario" required>

        <button type="submit">Guardar</button>
    </form>

    <p class="msg">{{ mensaje }}</p>
</div>

</body>
</html>
